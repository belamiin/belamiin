name: Validate README Links

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0' # Run weekly

jobs:
  check-links:                          # ← Job name required here
    runs-on: ubuntu-latest              # ← This was missing
    steps:                              # ← This was missing
      - uses: actions/checkout@v4       # ← This step was missing
      
      - name: Check links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          folder-path: '.'
          file-path: 'README.md'
          config-file: '.github/workflows/.mlc_config.json'
          use-quiet-mode: 'yes'
